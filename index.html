<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thúy Nga</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Lớp phủ chứa trái tim */
        #interaction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
            /* Hiệu ứng mờ dần khi biến mất */
        }

        .heart-icon {
            font-size: 80px;
            /* To hơn chút cho đẹp */
            color: red;
            animation: pulse 1s infinite;
            filter: drop-shadow(0 0 15px red);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        p {
            color: white;
            margin-top: 20px;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div id="interaction-overlay">
        <div class="heart-icon">❤️</div>
        <p>Click the heart to start</p>
    </div>

    <audio id="bg-music" loop>
        <source src="Perfect.mp3" type="audio/mpeg">
    </audio>

    <iframe src="index1.html" name="content-frame" id="myIframe"></iframe>

    <script>
        const music = document.getElementById('bg-music');
        const overlay = document.getElementById('interaction-overlay');

        overlay.addEventListener('click', () => {
            // 1. Phát nhạc
            music.play().catch(e => console.log("Lỗi nhạc:", e));

            // 2. Làm mờ và ẩn lớp phủ
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1000); // Ẩn hoàn toàn sau 1 giây
        });
    </script>
</body>

</html>
