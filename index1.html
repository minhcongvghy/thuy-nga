<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Real Fireworks Celebration</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 80px;
            letter-spacing: 10px;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* 🔥 ĐÃ CẬP NHẬT: Nút nằm ở góc dưới bên phải */
        #nextBtn {
            position: fixed;
            /* Cố định vị trí so với màn hình */
            bottom: 30px;
            /* Cách mép dưới 30px */
            right: 30px;
            /* Cách mép phải 30px */

            padding: 15px 35px;
            font-size: 18px;
            background: transparent;
            color: #4CAF50;
            border: 2px solid #4CAF50;
            border-radius: 50px;
            cursor: pointer;

            opacity: 0;
            /* Mặc định ẩn */
            pointer-events: none;
            transition: all 0.5s ease;
            text-transform: uppercase;
            font-weight: bold;
            z-index: 100;
        }

        #nextBtn.show {
            opacity: 1;
            pointer-events: auto;
            /* Cho phép click khi đã hiện */
        }

        #nextBtn:hover {
            background: #4CAF50;
            color: white;
            box-shadow: 0 0 20px #4CAF50;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <h1 id="title"></h1>
    </div>

    <button id="nextBtn" onclick="goNext()">Click to continued →</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const titleElement = document.getElementById('title');
        const btn = document.getElementById('nextBtn');
        const text = "NGA";

        let fireworks = [];
        let particles = [];
        let canStartFireworks = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Logic Pháo Hoa (Giữ nguyên như bản trước) ---
        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height / 2);
                // 3. Tăng tốc độ bay lên để pháo bắn liên tục hơn
                this.speed = 5 + Math.random() * 5;
                this.hue = Math.random() * 360;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fill();
            }
            explode() {
                // 4. Tăng số lượng hạt nổ (80 -> 150) để mỗi quả nổ to hơn
                for (let i = 0; i < 150; i++) {
                    particles.push(new Particle(this.x, this.y, this.hue));
                }
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y; this.hue = hue;
                this.gravity = 0.1;
                this.friction = 0.95;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 6;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.alpha})`;
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            // 1. Giảm độ mờ (0.15 -> 0.1) để đuôi pháo hoa giữ lại lâu hơn, nhìn sẽ dày hơn
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Tăng tần suất bắn (0.05 -> 0.2). Càng gần 1 bắn càng kinh khủng
            if (canStartFireworks && Math.random() < 0.2) {
                fireworks.push(new Firework());
            }

            fireworks = fireworks.filter(f => {
                if (f.update()) { f.draw(); return true; }
                return false;
            });

            particles = particles.filter(p => {
                if (p.update()) { p.draw(); return true; }
                return false;
            });

            requestAnimationFrame(animate);
        }

        // 🔥 ĐÃ CẬP NHẬT: Logic gõ chữ và hiện nút đúng lúc
        function typeText() {
            let i = 0;
            const typing = setInterval(() => {
                titleElement.textContent += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(typing);
                    canStartFireworks = true;

                    // Nút xuất hiện ngay sau khi START hiện xong
                    setTimeout(() => {
                        btn.classList.add('show');
                    }, 500); // 0.5s sau khi gõ xong sẽ hiện nút
                }
            }, 300);
        }

        animate();
        typeText();

        function goNext() {
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = "index2.html"; }, 600);
        }
    </script>
</body>

</html>
